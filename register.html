<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏆 Sports Academy Management System</h1>
        <p>Player Registration</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register Player</a>
        <a href="players.html">View Players</a>
    </nav>

    <div class="container">

        <h2>Register New Player</h2>

        <form id="playerForm">

            <label>Player Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter player name"
                required
            >

            <label>Age</label>
            <input
                type="number"
                id="age"
                min="5"
                max="60"
                placeholder="Enter age"
                required
            >

            <label>Gender</label>
            <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>

            <label>Sport</label>
            <select id="sport" required>
                <option value="">Select Sport</option>
                <option>Cricket</option>
                <option>Football</option>
                <option>Basketball</option>
                <option>Volleyball</option>
                <option>Badminton</option>
                <option>Kabaddi</option>
                <option>Kho-Kho</option>
                <option>Chess</option>
                <option>Athletics</option>
                <option>Swimming</option>
            </select>

            <label>Phone Number</label>
            <input
                type="tel"
                id="phone"
                maxlength="10"
                placeholder="Enter phone number"
                required
            >

            <button type="submit">Register Player</button>

        </form>

    </div>

    <footer>
        <p>© 2026 Sports Academy Management System</p>
    </footer>

    <script>

        document.getElementById("playerForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const player = {
                name: document.getElementById("name").value,
                age: document.getElementById("age").value,
                gender: document.getElementById("gender").value,
                sport: document.getElementById("sport").value,
                phone: document.getElementById("phone").value
            };

            try{

                const response = await fetch("/players",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify(player)

                });

                const data = await response.json();

                alert(data.message);

                document.getElementById("playerForm").reset();

                window.location.href = "players.html";

            }
            catch(error){

                alert("Error registering player.");

                console.log(error);

            }

        });

    </script>

</body>
</html>
